spring.application.name=MartaTransportationTracker

marta.api.key=${MARTA_API_KEY_0}

# MARTA API Endpoints
marta.train.url=https://developerservices.itsmarta.com:18096/itsmarta/railrealtimearrivals/developerservices/traindata
# GTFS Realtime endpoints for MARTA buses
# Vehicle Positions: Real-time vehicle location data
# Trip Updates: Real-time trip delay/cancellation information
marta.bus.feed.url=https://gtfs-rt.itsmarta.com/TMGTFSRealTimeWebService/vehicle

# HTTP Timeouts
marta.http.connect-timeout-ms=2000
marta.http.read-timeout-ms=5000

# Retry/Backoff Configuration
marta.retry.max-attempts=3
marta.retry.initial-delay-ms=500
marta.retry.multiplier=2.0
marta.retry.max-delay-ms=4000

